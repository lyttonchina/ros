# 配置文件用于代码仓库同步 ROS 模板
# 部署说明：
# 1. 将此文件放在仓库根目录
# 2. templates 子目录存放 ROS 模板文件
# 3. 在阿里云 ROS 控制台选择"通过代码仓库同步模板"即可自动部署

template-file-path: templates/apple-app-prod.json

parameters:
  # JAR 包 OSS 地址
  PackageUrl: "https://my-java-app-bucket.oss-us-east-1.aliyuncs.com/releases/hello-world-1.0-SNAPSHOT.jar"
  
  # SSL 证书 ID（从数字证书管理服务获取）
  CertificateId: "24280745"
  
  # SAE 应用名称
  AppName: "apple-api-prod"
  
  # 实例规格，格式：cpu:0.5,memory:1024
  InstanceSpec: "cpu:0.5,memory:1024"
  
  # 子域名 / RR记录值
  SubDomainName: "api-prod"
  
  # VSwitch CIDR 段
  VSwitchCidrBlock: "10.0.1.0/24"
  
  # VPC CIDR 段
  VpcCidrBlock: "10.0.0.0/16"
  
  # 可用区 ID
  ZoneId: "us-east-1a"
  
  # 最小实例数
  MinInstanceAmount: "1"
  
  # 最大实例数
  MaxInstanceAmount: "10"
  
  # 健康检查路径
  HealthCheckPath: "/api/health"
  
  # 托管的根域名（已在阿里云 DNS 添加）
  MainDomainName: "apple-app.cn"
  
  # SAE namespace 逻辑 ID
  NamespaceId: "us-east-1"

# 部署标签
tags:
  env: prod
  project: apple-api
  created-by: ros-template
